name: build-and-publish

# Builds an arm64-only, Cortex-A55-tuned rtorrent 0.16.18 image and pushes
# it to ghcr.io/josacar/rtorrent-docker. Uses GitHub's free native arm64
# runners (ubuntu-24.04-arm), so the build runs on real arm64 hardware -
# no QEMU emulation, ~5-10 min builds instead of ~30 min.

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      rtorrent_version:
        description: 'rakshasa rtorrent tag (without v prefix) to build'
        required: false
        default: '0.16.18'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    # Native arm64 runner. cortex-a55 gcc flags are valid directly.
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version + tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # arm64-only manifest; explicitly tag arch in addition to latest.
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest-armv8.2-rock3a,enable={{is_default_branch}}
            type=raw,value=arm64,enable={{is_default_branch}}

      - name: Build & push (arm64 only)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          build-args: |
            RTORRENT_VERSION=${{ github.event.inputs.rtorrent_version || '0.16.18' }}
            LIBTORRENT_VERSION=${{ github.event.inputs.rtorrent_version || '0.16.18' }}
          cache-from: type=gha,scope=arm64
          cache-to:   type=gha,mode=max,scope=arm64

      - name: Summary
        if: always()
        run: |
          {
            echo "## rtorrent-docker build"
            echo "Target: \`linux/arm64\` (Cortex-A55 / RK3568 / Rock 3A)"
            echo "Runner: \`ubuntu-24.04-arm\` (native arm64, no QEMU)"
            echo "Image:  \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`"
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
            echo "Pushed: \`${{ github.event_name != 'pull_request' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"