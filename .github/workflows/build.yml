name: build-and-publish

# Builds a multi-arch image (linux/arm64 + linux/amd64) using two native
# runners in parallel. The arm64 job runs on ubuntu-24.04-arm (free native
# arm64 hardware), the amd64 job on ubuntu-latest. Each pushes its own
# arch-specific tag, then a manifest job stitches them into combined tags
# (latest, semver). No QEMU involved.

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      rtorrent_version:
        description: 'rakshasa rtorrent tag (without v prefix) to build'
        required: false
        default: '0.16.18'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  RTORRENT_VERSION: ${{ github.event.inputs.rtorrent_version || '0.16.18' }}

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64
          provenance: true
          sbom: true
          build-args: RTORRENT_VERSION=${{ env.RTORRENT_VERSION }}
          cache-from: type=gha,scope=arm64
          cache-to:   type=gha,mode=max,scope=arm64

      - name: Smoke test (arm64)
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          docker run -d --name rtorrent-test ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64
          for i in $(seq 20); do sleep 1
            docker exec rtorrent-test nc -z 127.0.0.1 5000 2>/dev/null && break
          done
          docker exec rtorrent-test nc -z 127.0.0.1 5000 2>/dev/null \
            && echo "arm64 SCGI PASSED" \
            || { echo "arm64 SCGI FAILED"; docker logs rtorrent-test; exit 1; }
          docker kill rtorrent-test >/dev/null 2>&1 || true

  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64
          provenance: true
          sbom: true
          build-args: RTORRENT_VERSION=${{ env.RTORRENT_VERSION }}
          cache-from: type=gha,scope=amd64
          cache-to:   type=gha,mode=max,scope=amd64

      - name: Smoke test (amd64)
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          docker run -d --name rtorrent-test ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64
          for i in $(seq 20); do sleep 1
            docker exec rtorrent-test nc -z 127.0.0.1 5000 2>/dev/null && break
          done
          docker exec rtorrent-test nc -z 127.0.0.1 5000 2>/dev/null \
            && echo "amd64 SCGI PASSED" \
            || { echo "amd64 SCGI FAILED"; docker logs rtorrent-test; exit 1; }
          docker kill rtorrent-test >/dev/null 2>&1 || true

  manifest:
    if: ${{ github.event_name != 'pull_request' }}
    needs: [build-arm64, build-amd64]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve combined tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest-armv8.2-rock3a,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Create multi-arch manifest
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          ARM64_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64
          AMD64_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64
        run: |
          echo "$TAGS" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Creating manifest: $tag"
            docker buildx imagetools create -t "$tag" "$ARM64_TAG" "$AMD64_TAG"
          done

      - name: Summary
        run: |
          {
            echo "## rtorrent-docker multi-arch manifest"
            echo "arm64: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64\`"
            echo "amd64: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64\`"
            echo ""
            echo "### Combined tags"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" \
            | while IFS= read -r tag; do
                [ -z "$tag" ] && continue
                echo "- \`$tag\`" >> "$GITHUB_STEP_SUMMARY"
              done