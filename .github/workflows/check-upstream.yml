name: check-upstream

# Monthly check for new rakshasa rtorrent/libtorrent releases.
# When a newer version is found, opens a PR bumping the build-arg defaults.

on:
  schedule:
    # 1st of each month at 06:00 UTC
    - cron: '0 6 1 * *'
  workflow_dispatch:      # also triggerable manually

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Fetch latest upstream release
        id: latest
        run: |
          LATEST=$(gh api repos/rakshasa/rtorrent/releases/latest --jq '.tag_name' | sed 's/^v//')
          CURRENT=$(grep '^ARG RTORRENT_VERSION=' Dockerfile | sed 's/ARG RTORRENT_VERSION=//')
          echo "current=$CURRENT"
          echo "latest=$LATEST"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check for existing bump PR
        id: existing
        if: ${{ steps.latest.outputs.latest != steps.latest.outputs.current }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_EXISTS=$(gh pr list \
            --head "bump/v${{ steps.latest.outputs.latest }}" \
            --json number --jq 'length')
          echo "pr_exists=$([ "$PR_EXISTS" -ge 1 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Bump version in Dockerfile
        if: ${{ steps.latest.outputs.latest != steps.latest.outputs.current && !steps.existing.outputs.pr_exists }}
        run: |
          sed -i "s/^ARG RTORRENT_VERSION=.*$/ARG RTORRENT_VERSION=${{ steps.latest.outputs.latest }}/" Dockerfile
          sed -i "s/^ARG LIBTORRENT_VERSION=.*$/ARG LIBTORRENT_VERSION=${{ steps.latest.outputs.latest }}/" Dockerfile

      - name: Create pull request
        if: ${{ steps.latest.outputs.latest != steps.latest.outputs.current && !steps.existing.outputs.pr_exists }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "Bump rtorrent/libtorrent to v${{ steps.latest.outputs.latest }}"
          title: "Update rtorrent/libtorrent to v${{ steps.latest.outputs.latest }}"
          body: |
            Upstream rakshasa released rtorrent **v${{ steps.latest.outputs.latest }}**.
            This PR bumps the build-arg defaults in the Dockerfile.
          branch: bump/v${{ steps.latest.outputs.latest }}
          base: main
          labels: dependencies